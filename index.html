<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';">
<title>Starry Quiz TTS</title>
<style>
  :root {
    --bg-deep: #050a15;
    --nebula-1: #0d1b33;
    --nebula-2: #1a0b2e;
    --panel: rgba(15, 25, 45, 0.7);
    --panel-border: rgba(255, 255, 255, 0.1);
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #7dd3fc;
    --accent-glow: rgba(125, 211, 252, 0.4);
    --success: #6ee7b7;
    --danger: #fda4af;
  }

  * { box-sizing: border-box; }

  /* 背景（暗い青＋ネビュラ） */
  body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at center, #001529 0%, #000814 100%);
    background-image:
      radial-gradient(circle at 20% 30%, var(--nebula-2) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, var(--nebula-1) 0%, transparent 40%);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ★星のまたたき（旧 body::before）は削除して、音符背景に置き換え */
  #bg-notes {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: -1; /* 画面の一番奥 */
  }

  .floating-note {
    position: absolute;
    bottom: -60px;
    left: 0;
    color: #e6f6ff; /* 青白い氷光 */
    user-select: none;
    pointer-events: none;
    text-shadow:
      0 0 6px #e6f6ff,
      0 0 14px #bfe9ff,
      0 0 24px rgba(191, 233, 255, 0.6);
    filter: drop-shadow(0 0 6px rgba(191, 233, 255, 0.45));
    will-change: transform, opacity;
    animation: noteRise linear forwards;
  }

  /* 下から湧く→上で泡っぽく弾ける */
  @keyframes noteRise {
    0%   { transform: translate3d(0, 0, 0) scale(0.9) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.75; }
    70%  { opacity: 0.75; }
    85%  { transform: translate3d(var(--drift, 0px), -78vh, 0) scale(1.15) rotate(18deg); opacity: 0.7; }
    100% { transform: translate3d(calc(var(--drift, 0px) * 1.2), -92vh, 0) scale(2.35) rotate(26deg); opacity: 0; }
  }

  header {
    backdrop-filter: blur(12px);
    background: rgba(5, 10, 21, 0.8);
    border-bottom: 1px solid var(--panel-border);
    padding: 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    margin: 0;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-size: 1.4rem;
    color: var(--accent);
    text-shadow: 0 0 15px var(--accent-glow);
  }

  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    gap: 20px;
  }

  .card {
    background: var(--panel);
    backdrop-filter: blur(10px);
    border: 1px solid var(--panel-border);
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  h3 {
    margin-top: 0;
    font-size: 0.9rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-left: 3px solid var(--accent);
    padding-left: 10px;
    margin-bottom: 20px;
  }

  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .grid-settings {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 11px; color: var(--muted); font-weight: 600; }

  input, select {
    background: rgba(0, 0, 0, 0.3);
    color: var(--text);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 10px;
    font-size: 14px;
    transition: all 0.3s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    outline: none;
  }

  button {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 10px 18px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  button:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-1px); }
  button.primary { background: var(--accent); color: #050a15; font-weight: bold; border: none; }
  button.primary:hover { background: #bae6fd; box-shadow: 0 0 15px var(--accent-glow); }
  button.success { border-color: var(--success); color: var(--success); }

  progress {
    width: 100%;
    height: 6px;
    border-radius: 10px;
    overflow: hidden;
    appearance: none;
  }
  progress::-webkit-progress-bar { background: rgba(255,255,255,0.1); }
  progress::-webkit-progress-value {
    background: linear-gradient(90deg, var(--accent), var(--success));
    box-shadow: 0 0 10px var(--accent-glow);
  }

  .list {
    margin-top: 10px;
    max-height: 400px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--panel-border) transparent;
  }

  .item {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    border-bottom: 1px solid var(--panel-border);
    transition: 0.3s;
    border-radius: 10px;
    margin-bottom: 4px;
  }
  .item:hover { background: rgba(255, 255, 255, 0.03); }
  .item.active {
    background: rgba(125, 211, 252, 0.1);
    border: 1px solid var(--accent);
  }

  .q { font-weight: 500; color: #fff; margin-bottom: 4px; }
  .a { color: var(--accent); font-size: 0.95rem; animation: fadeIn 0.5s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  .kbd {
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    border: 1px solid rgba(255,255,255,0.2);
  }

  #status { font-size: 13px; margin: 10px 0; color: var(--accent); }

  /* =========================
     ✅ スマホ最適化（文字が小さい問題の根治）
     目的：16px未満を消す / タップ領域を確保 / 入力を読みやすく
     ========================= */
  @media (max-width: 600px) {

    /* 余白を少し詰めて“拡大しなくても読める密度”へ */
    header { padding: 14px 12px; }
    header h1 {
      font-size: 1.6rem;
      letter-spacing: 2px;
    }

    .wrap { padding: 12px; gap: 14px; }
    .card { padding: 16px; border-radius: 18px; }

    /* 入力エリアは2列固定だと狭い：1列が正義 */
    .grid-settings { grid-template-columns: 1fr; }

    /* 文字サイズ：iOSのズーム発動（16px未満）を根絶 */
    body { font-size: 16px; }

    label { font-size: 13px; }

    input, select, textarea, button {
      font-size: 16px;
      line-height: 1.25;
    }

    /* textarea はインラインで 13px 指定されてるので上書き */
    #directInput { font-size: 16px !important; }

    /* タップ領域：最低44px（指はマウスじゃない） */
    button { padding: 14px 16px; min-height: 44px; }
    input, select, textarea { padding: 12px; }

    /* コントロール行は縦積みで押しやすく */
    .row { gap: 10px; }

    /* “操作ボタン行”だけ縦積み（他のrowは崩さない） */
    #startBtn, #pauseBtn, #stopBtn, #prevBtn, #nextBtn { width: 100%; justify-content: center; }

    /* キーヒントはスマホでは小さすぎ＆必要度低いので控えめに */
    .kbd { font-size: 11px; }
    #status { font-size: 14px; }

    /* 重い端末対策：ブラーを少し軽量化（雰囲気は保つ） */
    header { backdrop-filter: blur(8px); }
    .card { backdrop-filter: blur(8px); }
  }
</style>
</head>
<body>

<!-- 背景：音符レイヤー -->
<div id="bg-notes" aria-hidden="true"></div>

<header>
  <h1 id="appTitle">Starry Quiz TTS</h1>
</header>

<main class="wrap">
  <section class="card">
    <h3><i class="icon">✧</i> <span id="configHeading">configuration</span></h3>
    <div class="grid-settings">
      <div class="field"><label id="labelImport">JSON / TXT 読込</label><input id="topImportFile" type="file" accept="application/json,text/plain,.json,.txt"></div>
      <div class="field"><label id="labelRepeat">リピート</label><input id="repeatQ" type="number" value="1"></div>
      <div class="field"><label id="labelDelay">解答まで(秒)</label><input id="delayA" type="number" value="3" step="0.5"></div>
      <div class="field"><label id="labelLanguage">言語 / Language</label>
        <select id="langHint">
          <option value="ja-JP" selected>日本語</option>
          <option value="en-US">English (US)</option>
        </select>
      </div>
      <div class="field"><label id="labelVoice">声</label><select id="voice"></select></div>
      <div class="field"><label id="labelShowAnswer">解答表示</label>
        <select id="showAnswer">
          <option value="0" id="showAnswerOption0">クイズ中のみ表示</option>
          <option value="1" id="showAnswerOption1">常に表示</option>
        </select>
      </div>
    </div>

    <!-- 直接入力エリア -->
    <div style="margin-top: 20px;">
      <div class="field">
        <label id="labelDirectInput">直接入力（1行に1問：質問|答え）</label>
        <textarea id="directInput" rows="5" placeholder="例：
太陽系で最も大きい惑星は？|木星
光が1年間に進む距離を何という？|光年
最も近い恒星は？|プロキシマ・ケンタウリ" style="
          width: 100%;
          background: rgba(0,0,0,0.3);
          color: var(--text);
          border: 1px solid var(--panel-border);
          border-radius: 8px;
          padding: 10px;
          font-size: 13px;
          font-family: inherit;
          resize: vertical;
          transition: all 0.3s;
        "></textarea>
      </div>
      <div class="row" style="margin-top: 10px;">
        <button id="loadDirectBtn" class="primary">📋 入力から読込</button>
        <span id="directHelp" style="font-size: 11px; color: var(--muted);">「質問|答え」形式で1行1問。区切りは | または タブ</span>
      </div>
    </div>

    <div class="row" style="margin-top: 20px;">
      <button id="clearBtn">クリア</button>
      <div style="flex-grow: 1;"></div>
      <div class="field" style="flex-direction: row; align-items: center; gap: 10px;">
        <label id="labelRate">速度</label><input id="rate" type="number" value="1" step="0.1" style="width: 60px;">
        <label id="labelVolume">音量</label><input id="vol" type="number" value="0.8" step="0.1" style="width: 60px;">
      </div>
    </div>
  </section>

  <section class="card">
    <div class="row" style="margin-bottom: 20px;">
      <button id="startBtn" class="primary">▶ PLAY START</button>
      <button id="pauseBtn">⏸ PAUSE / RESUME</button>
      <button id="stopBtn">⏹ STOP</button>
      <button id="prevBtn">⏮</button>
      <button id="nextBtn">⏭</button>
    </div>
    <progress id="prog" value="0" max="1"></progress>
    <div id="status">Ready to explore...</div>
    <div id="errorMsg" style="color:var(--danger); display:none; font-size:12px;"></div>
    <div id="successMsg" style="color:var(--success); display:none; font-size:12px;"></div>
  </section>

  <section class="card">
    <h3><i class="icon">✦</i> <span id="questionListHeading">question list</span></h3>
    <div id="list" class="list"></div>
    <div class="row" style="margin-top: 15px; font-size: 11px; color: var(--muted);">
      <span id="kbdSpaceHint">⌨ <span class="kbd">Space</span> 再生/停止</span>
      <span id="kbdArrowHint"><span class="kbd">←/→</span> 前/次</span>
      <span id="kbdAHint"><span class="kbd">A</span> 表示切替</span>
    </div>
  </section>
</main>

<script>
// --- [JavaScript部分は元のロジックを完全継承、一部UI更新用に関数のみ調整] ---
'use strict';


const I18N = {
  ja: {
    htmlLang: 'ja',
    title: 'Starry Quiz TTS',
    configHeading: 'configuration',
    labelImport: 'JSON / TXT 読込',
    labelRepeat: 'リピート',
    labelDelay: '解答まで(秒)',
    labelLanguage: '言語 / Language',
    labelVoice: '声',
    labelShowAnswer: '解答表示',
    showAnswer0: 'クイズ中のみ表示',
    showAnswer1: '常に表示',
    labelDirectInput: '直接入力（1行に1問：質問|答え）',
    directPlaceholder: '例：\n太陽系で最も大きい惑星は？|木星\n光が1年間に進む距離を何という？|光年\n最も近い恒星は？|プロキシマ・ケンタウリ',
    loadFromInput: '📋 入力から読込',
    directHelp: '「質問|答え」形式で1行1問。区切りは | または タブ',
    clear: 'クリア',
    rate: '速度',
    volume: '音量',
    start: '▶ 再生開始',
    pause: '⏸ 一時停止 / 再開',
    stop: '⏹ 停止',
    questionList: 'question list',
    statusReady: '準備完了',
    statusReadyEmbedded: '準備完了（ボカロクイズ読込済み）',
    statusExploring: (n) => `再生中 #${n}...`,
    statusDiscoveryComplete: '最後まで再生しました',
    statusVoyageEnd: '再生終了',
    statusPaused: '一時停止中',
    statusStopped: '停止しました',
    choicesLabel: '選択肢',
    correctLabel: '正解',
    noInput: 'テキストが入力されていません',
    invalidQA: '有効なQ&Aが見つかりません。「質問|答え」形式で入力してください。',
    fileInvalidQA: '有効なQ&Aが見つかりません。「質問|答え」形式で記述してください。',
    loadedCount: (n) => `${n}問 読み込みました！`,
    jsonLoaded: 'JSON Loaded',
    jsonParseError: 'JSONの解析に失敗しました。',
    embeddedLoaded: (n) => `Vocaloid Quiz Loaded (${n}問)`,
    embeddedFailed: '埋め込みデータの読込に失敗しました',
    spaceHint: '⌨ <span class="kbd">Space</span> 再生/停止',
    arrowHint: '<span class="kbd">←/→</span> 前/次',
    aHint: '<span class="kbd">A</span> 表示切替'
  },
  en: {
    htmlLang: 'en',
    title: 'Starry Quiz TTS',
    configHeading: 'configuration',
    labelImport: 'Import JSON / TXT',
    labelRepeat: 'Repeat',
    labelDelay: 'Seconds before answer',
    labelLanguage: '言語 / Language',
    labelVoice: 'Voice',
    labelShowAnswer: 'Answer display',
    showAnswer0: 'Show only during quiz',
    showAnswer1: 'Always show',
    labelDirectInput: 'Direct input (one question per line: question|answer)',
    directPlaceholder: 'Example:\nWhich is the largest planet in the Solar System?|Jupiter\nWhat do you call the distance light travels in one year?|A light-year\nWhat is the nearest star to the Sun?|Proxima Centauri',
    loadFromInput: '📋 Load from input',
    directHelp: 'One question per line in “question|answer” format. Use | or a tab as the separator.',
    clear: 'Clear',
    rate: 'Rate',
    volume: 'Volume',
    start: '▶ PLAY START',
    pause: '⏸ PAUSE / RESUME',
    stop: '⏹ STOP',
    questionList: 'question list',
    statusReady: 'Ready',
    statusReadyEmbedded: 'Ready (Vocaloid quiz loaded)',
    statusExploring: (n) => `Playing #${n}...`,
    statusDiscoveryComplete: 'Playback complete',
    statusVoyageEnd: 'Reached the end',
    statusPaused: 'Paused',
    statusStopped: 'Stopped',
    choicesLabel: 'Choices',
    correctLabel: 'Correct answer',
    noInput: 'No text has been entered.',
    invalidQA: 'No valid Q&A pairs were found. Please use the “question|answer” format.',
    fileInvalidQA: 'No valid Q&A pairs were found. Please write them in the “question|answer” format.',
    loadedCount: (n) => `${n} questions loaded!`,
    jsonLoaded: 'JSON loaded',
    jsonParseError: 'Failed to parse JSON.',
    embeddedLoaded: (n) => `Vocaloid Quiz Loaded (${n} questions)`,
    embeddedFailed: 'Failed to load embedded data.',
    spaceHint: '⌨ <span class="kbd">Space</span> Play/Pause',
    arrowHint: '<span class="kbd">←/→</span> Prev/Next',
    aHint: '<span class="kbd">A</span> Toggle answers'
  }
};

function getUiLang() {
  return elements.langHint.value.startsWith('en') ? 'en' : 'ja';
}
function t(key, ...args) {
  const dict = I18N[getUiLang()] || I18N.ja;
  const value = dict[key];
  return typeof value === 'function' ? value(...args) : value;
}
function getLocalizedText(value, lang = getUiLang()) {
  if (value && typeof value === 'object' && !Array.isArray(value)) {
    return value[lang] ?? value.ja ?? value.en ?? '';
  }
  return value ?? '';
}
function getLocalizedChoices(value, lang = getUiLang()) {
  if (Array.isArray(value)) return value;
  if (value && typeof value === 'object') return value[lang] ?? value.ja ?? value.en ?? [];
  return [];
}
function applyI18n() {
  document.documentElement.lang = I18N[getUiLang()].htmlLang;
  document.getElementById('appTitle').textContent = t('title');
  document.getElementById('configHeading').textContent = t('configHeading');
  document.getElementById('labelImport').textContent = t('labelImport');
  document.getElementById('labelRepeat').textContent = t('labelRepeat');
  document.getElementById('labelDelay').textContent = t('labelDelay');
  document.getElementById('labelLanguage').textContent = t('labelLanguage');
  document.getElementById('labelVoice').textContent = t('labelVoice');
  document.getElementById('labelShowAnswer').textContent = t('labelShowAnswer');
  document.getElementById('showAnswerOption0').textContent = t('showAnswer0');
  document.getElementById('showAnswerOption1').textContent = t('showAnswer1');
  document.getElementById('labelDirectInput').textContent = t('labelDirectInput');
  document.getElementById('directInput').placeholder = t('directPlaceholder');
  document.getElementById('loadDirectBtn').textContent = t('loadFromInput');
  document.getElementById('directHelp').textContent = t('directHelp');
  document.getElementById('clearBtn').textContent = t('clear');
  document.getElementById('labelRate').textContent = t('rate');
  document.getElementById('labelVolume').textContent = t('volume');
  document.getElementById('startBtn').textContent = t('start');
  document.getElementById('pauseBtn').textContent = t('pause');
  document.getElementById('stopBtn').textContent = t('stop');
  document.getElementById('questionListHeading').textContent = t('questionList');
  document.getElementById('kbdSpaceHint').innerHTML = t('spaceHint');
  document.getElementById('kbdArrowHint').innerHTML = t('arrowHint');
  document.getElementById('kbdAHint').innerHTML = t('aHint');
  if (!playing && !paused && idx < 0) updateStatus(t('statusReady'));
  renderList();
}


const EMBEDDED_DATA = {"version": 2, "items": [{"q": "次の記述は正しいか誤りか。危険物とは、消防法別表第一に定める品名に該当する物品で、同表に定める区分に応じ同表に定める性質を有するものをいう。", "a": "正しい。消防法第2条第7項の定義どおりです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。第4類危険物は「自己反応性物質」に分類される。", "a": "誤り。第4類は「引火性液体」です。自己反応性物質は第5類です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。指定数量とは、危険物について、その危険性を勘案して政令で定める数量である。", "a": "正しい。政令で品名・性質ごとに定められています。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。指定数量未満の危険物を貯蔵・取扱う場合でも、市町村条例の規制を受けることがある。", "a": "正しい。指定数量未満は市町村条例の規制対象となります。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。指定数量以上の危険物を貯蔵・取扱うには、製造所等として市町村長等の許可が必要である。", "a": "正しい。無許可で貯蔵・取扱うことはできません。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。ガソリンの指定数量は400リットルである。", "a": "誤り。ガソリン（第一石油類・非水溶性）の指定数量は200リットルです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。軽油の指定数量は1000リットルである。", "a": "正しい。軽油（第二石油類・非水溶性）は1000リットルです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。重油の指定数量は2000リットルである。", "a": "正しい。重油（第三石油類・非水溶性）は2000リットルです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。メタノールおよびエタノールの指定数量は400リットルである。", "a": "正しい。アルコール類の指定数量は400リットルです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。動植物油類の指定数量は10000リットルである。", "a": "正しい。動植物油類は10000リットルです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。指定数量の倍数とは、貯蔵・取扱う危険物の数量を、その危険物の指定数量で割った値である。", "a": "正しい。複数の危険物を貯蔵する場合は、各危険物ごとの倍数を合計します。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。製造所等を設置する場合、設置許可の前に必ず完成検査を受けなければならない。", "a": "誤り。完成検査は工事完了後に受けます。許可は工事開始前に必要です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。製造所等の位置・構造・設備を変更する場合、市町村長等の許可は不要である。", "a": "誤り。変更の場合も市町村長等の許可が必要です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。危険物保安監督者は、甲種または乙種危険物取扱者免状を有する者で、6か月以上の実務経験が必要である。", "a": "正しい。丙種は危険物保安監督者になれません。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。すべての製造所等に危険物保安監督者を選任しなければならない。", "a": "誤り。政令で定める一定規模以上の製造所等にのみ選任が必要です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。危険物保安統括管理者は、事業所全体の危険物の保安に関する業務を統括管理する者である。", "a": "正しい。一定数量以上の危険物を取り扱う事業所に選任義務があります。", "choices": ["正しい", "誤り"]}, {"q": "次の記述 気を逃がすことができます。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。比重が1より小さい液体は、水に浮く。", "a": "正しい。比重1未満は水より軽いため浮きます。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。第4類危険物のほとんどは、水より軽い（比重が1より小さい）。", "a": "正しい。ただし二硫化炭素など一部は水より重いです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。蒸気密度（空気を1としたときの比重）が1より大きい蒸気は、空気より軽く上方に拡散しやすい。", "a": "誤り。蒸気密度が1より大きい場合、空気より重く低所に滞留しやすくなります。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。第4類危険物の蒸気は、一般に空気より重いため、低い場所に滞留しやすい。", "a": "正しい。床面付近に蒸気がたまりやすく、火災・中毒の危険があります。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。水溶性の危険物の火災には、水による希釈消火が有効な場合がある。", "a": "正しい。アルコール類など水溶性のものは水で希釈すると燃焼しにくくなる場合があります。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。非水溶性の第4類危険物に注水すると、油が水に浮いて火災が拡大するおそれがある。", "a": "正しい。油は水より軽いため、注水により燃焼面が拡大する危険があります。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。酸化とは、物質が酸素と化合する反応のみを指す。", "a": "誤り。酸化は酸素との化合だけでなく、水素を失う反応や電子を失う反応も含む広い概念です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。還元とは、酸化物が酸素を失う反応、または物質が電子を受け取る反応をいう。", "a": "正しい。酸化の逆の反応として定義されます。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。物質が固体から直接気体に変化する現象を昇華という。", "a": "正しい。昇華の定義どおりです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。沸点とは、液体の蒸気圧が外圧（大気圧）と等しくなる温度をいう。", "a": "正しい。沸点の定義どおりです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。引火点の低い物質は、常温でも引火しやすく危険性が高い。", "a": "正しい。引火点が低いほど常温で引火する危険が高くなります。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。ジエチルエーテルは、第4類の中でも特に引火点が低い物質の一つである。", "a": "正しい。ジエチルエーテルの引火点は約マイナス45度と極めて低いです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。物質が燃焼する際に発生する熱量を熱量（発熱量）といい、単位はジュールやカロリーが用いられる。", "a": "正しい。熱量の単位として正しいです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。自己反応性物質は、酸素の供給がなくても燃焼・爆発することがある。", "a": "正しい。分子内に酸素を含むなどの理由で自己分解的に反応するものがあります（第5類の特徴）。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。引火点が常温（20度前後）より低い液体は、容器のふたを開けただけでも引火の危険がある。", "a": "正しい。常温で可燃性蒸気が発生するため危険性が高いです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。静電気の放電（火花）は、可燃性蒸気の点火源となることがある。", "a": "正しい。静電気火花は引火源として重要な要素です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。物質の燃焼速度は、酸素の供給量が多いほど一般に遅くなる。", "a": "誤り。酸素の供給量が多いほど燃焼速度は一般に速くなります。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。第4類危険物は「引火性液体」であり、いずれも常温（20度）で液体である。", "a": "正しい。第4類は常温で液体の引火性物質です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。特殊引火物とは、1気圧において発火点が100度以下の物品、または引火点がマイナス20度以下で沸点が40度以下の物品をいう。", "a": "正しい。法令上の特殊引火物の定義どおりです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。二硫化炭素は、第4類の中で最も発火点が低い物質の一つであり、約90度で発火する。", "a": "正しい。二硫化炭素の発火点は約90度と非常に低いです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。二硫化炭素は水より軽いため、貯蔵する際は水中に保存してはならない。", "a": "誤り。二硫化炭素は水より重いため、水を満たした容器中に保存し蒸気の発生を抑えます。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。ガソリンの引火点はおおむねマイナス40度以下である。", "a": "正しい。ガソリンの引火点は非常に低く、常温で引火しやすいです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。ガソリンに灯油や軽油を混ぜると、引火点が大きく上昇し安全になる。", "a": "誤り。少量混入でも引火点は大きく低下し、より危険になります。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。第一石油類とは、1気圧において引火点が21度未満の物品をいう。", "a": "正しい。ガソリン、ベンゼン、トルエン等が該当します。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。アルコール類とは、1分子を構成する炭素の原子数が1個から3個までの飽和一価アルコールをいう。", "a": "正しい。メタノール・エタノール・プロパノール等が該当します。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。メタノールは、燃焼時に炎の色が淡く、明るい昼間では炎が見えにくい。", "a": "正しい。メタノールの火災は炎が見えにくく、注意が必要です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。第二石油類とは、1気圧において引火点が21度以上70度未満の物品をいう。", "a": "正しい。灯油、軽油等が該当します。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。灯油の引火点はおおむね40度以上である。", "a": "正しい。灯油は常温ではほとんど引火しません。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。軽油の引火点はおおむね45度以上である。", "a": "正しい。軽油も常温では引火しにくいです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。第三石油類とは、1気圧において引火点が70度以上200度未満の物品をいう。", "a": "正しい。重油、クレオソート油等が該当します。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。重油は、引火点が高いため常温で引火する危険性はまったくない。", "a": "誤り。引火点は高いものの、加熱されたり霧状になった場合などは引火の危険があります。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。第四石油類とは、1気圧において引火点が200度以上250度未満の物品をいう。", "a": "正しい。ギヤー油、シリンダー油等が該当します。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。動植物油類は、1気圧において引火点が250度未満の動物・植物の油脂をいう。", "a": "正しい。法令上の定義どおりです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。動植物油類は、布や繊維にしみ込んだ状態で空気に触れると自然発火を起こすことがある。", "a": "正しい。ヨウ素価の高い乾性油ほど自然発火しやすいです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。ヨウ素価が高い動植物油ほど、自然発火しにくい。", "a": "誤り。ヨウ素価が高いほど酸化されやすく、自然発火しやすくなります。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。ベンゼンは無色の液体で特有の芳香臭を持ち、水に溶けにくい。", "a": "正しい。ベンゼンの性質として正しいです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。トルエンはベンゼンと比較して毒性が低く、引火点もベンゼンより高い。", "a": "正しい。トルエンの引火点はベンゼンより高く、約4度前後です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。アセトンは水によく溶け、引火点は0度よりも低い。", "a": "正しい。アセトンは水溶性で、引火点は約マイナス20度です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。第4類危険物の火災には、二酸化炭素消火剤や粉末消火剤による窒息消火が有効である。", "a": "正しい。酸素を遮断する窒息消火が効果的です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。第4類危険物の火災には、棒状の水を直接放水することが最も効果的である。", "a": "誤り。非水溶性の油は水に浮いて火災が拡大するため、棒状放水は不適切な場合が多いです。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。泡消火剤は、油面を覆うことで空気を遮断し、消火する効果がある。", "a": "正しい。泡による窒息効果・冷却効果があります。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。アルコール類の火災には、一般の泡消火剤が泡を破壊されて効果が薄れることがあるため、耐アルコール泡（水溶性液体用泡消火剤）が用いられる。", "a": "正しい。アルコール用泡消火剤の使用が推奨されます。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。危険物を貯蔵する容器は、密封せず常に開放しておくことが望ましい。", "a": "誤り。蒸気の発生・拡散を防ぐため、容器は密封して貯蔵することが基本です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。第4類危険物を取扱う場所では、火花を発生する機器の使用や火気の使用を避ける必要がある。", "a": "正しい。引火性蒸気への着火防止のため重要です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。第4類危険物を貯蔵・取扱う場所は、できるだけ通気・換気をよくし、可燃性蒸気の滞留を防ぐ必要がある。", "a": "正しい。蒸気滞留による爆発・火災の防止に重要です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。危険物を詰め替える作業を行う場合、容器同士を接触させないようにすることで静電気事故を防止できる。", "a": "誤り。容器同士を接触させる、または接地することにより静電気を逃がすことが事故防止につながります。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。ガソリンを貯蔵するドラム缶は、転倒・落下による衝撃や直射日光を避けて保管する必要がある。", "a": "正しい。温度上昇や物理的損傷を避けることが重要です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。第4類危険物は、酸化性物質（第1類・第6類等）と混合・接触すると、発火・爆発の危険性が増す。", "a": "正しい。酸化性物質との接触は危険を増大させます。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。給油取扱所において、自動車等への給油時はエンジンを停止させる必要はない。", "a": "誤り。給油時は原則としてエンジンを停止させなければなりません。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。危険物を取扱う作業者は、保護具（保護手袋、保護眼鏡等）を適切に使用することが求められる。", "a": "正しい。皮膚障害や眼への刺激を防ぐため必要です。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。第4類危険物による中毒や火災が発生した場合、風上から接近し、できるだけ低い姿勢で行動することが望ましい。", "a": "正しい。蒸気は低所に滞留しやすく、風上からの接近で蒸気の吸入を避けられます。", "choices": ["正しい", "誤り"]}, {"q": "次の記述は正しいか誤りか。第4類危険物の貯蔵・取扱いにおいては、温度管理を行い、直射日光や高温を避けることが、引火点に達するのを防ぐ上で重要である。", "a": "正しい。温度管理は火災予防の基本です。", "choices": ["正しい", "誤り"]}]};

function loadVoices() {
  const voices = speechSynthesis.getVoices();
  const hint = elements.langHint.value;
  elements.voiceSel.innerHTML = '';
  const filtered = voices.filter(v => v.lang.startsWith(hint.substring(0, 2)));
  (filtered.length ? filtered : voices).forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name; opt.textContent = `${v.name} (${v.lang})`;
    elements.voiceSel.appendChild(opt);
  });
}
speechSynthesis.addEventListener('voiceschanged', loadVoices);
elements.langHint.addEventListener('change', () => { loadVoices(); applyI18n(); });

function hardStop() {
  playSessionId++;
  speechSynthesis.cancel();
  if (currentTimeout) { clearTimeout(currentTimeout); currentTimeout = null; }
  revealAnswerForCurrent = false;
}

async function speakText(text, sessionAtStart) {
  return new Promise(resolve => {
    if (sessionAtStart !== playSessionId || !playing) return resolve();
    const u = new SpeechSynthesisUtterance(String(text || ''));
    const voices = speechSynthesis.getVoices();
    u.voice = voices.find(v => v.name === elements.voiceSel.value) || null;
    u.volume = parseFloat(elements.vol.value);
    u.rate = parseFloat(elements.rate.value);
    u.lang = elements.langHint.value;
    u.onend = resolve;
    u.onerror = resolve;
    speechSynthesis.speak(u);
  });
}

function sleep(ms) {
  return new Promise(resolve => { currentTimeout = setTimeout(() => { currentTimeout = null; resolve(); }, ms); });
}

function renderList() {
  elements.list.innerHTML = '';
  const alwaysShow = elements.showAnswerSel.value === '1';
  items.forEach((it, i) => {
    const row = document.createElement('div');
    row.className = `item ${i === idx ? 'active' : ''}`;
    row.dataset.idx = i;

    const content = document.createElement('div');
    const question = getLocalizedText(it.q);
    const answer = getLocalizedText(it.a);
    const choices = getLocalizedChoices(it.choices);
    const qDiv = document.createElement('div'); qDiv.className = 'q'; qDiv.textContent = `#${i+1} ${question}`;
    content.appendChild(qDiv);

    if (choices.length) {
      const cDiv = document.createElement('div');
      cDiv.style.color = 'var(--muted)';
      cDiv.style.fontSize = '0.85rem';
      cDiv.textContent = choices.map((c, idx2) => `${String.fromCharCode(65+idx2)}. ${c}`).join('   ');
      content.appendChild(cDiv);
    }
    if (alwaysShow || revealedAnswerIdxSet.has(i) || (playing && i === idx && revealAnswerForCurrent)) {
      const aDiv = document.createElement('div'); aDiv.className = 'a'; aDiv.textContent = `▸ ${answer}`;
      content.appendChild(aDiv);
    }
    row.appendChild(content);
    elements.list.appendChild(row);
  });
}

async function playLoop(sessionAtStart) {
  while (sessionAtStart === playSessionId && playing) {
    if (idx < 0 || idx >= items.length) {
      playing = false; updateStatus(t('statusDiscoveryComplete')); renderList(); return;
    }
    const it = items[idx];
    revealAnswerForCurrent = false;
    renderList();
    updateProgress();
    elements.list.children[idx]?.scrollIntoView({behavior:'smooth', block:'center'});
    const question = getLocalizedText(it.q);
    const answer = getLocalizedText(it.a);
    const choices = getLocalizedChoices(it.choices);
    updateStatus(t('statusExploring', idx + 1));

    for (let r = 0; r < parseInt(elements.repeatQ.value); r++) {
      if (sessionAtStart !== playSessionId) return;
      await speakText(question, sessionAtStart);
      await sleep(500);
    }

    if (choices.length) {
      await speakText(t('choicesLabel'), sessionAtStart);
      await sleep(250);
      for (let k = 0; k < choices.length; k++) {
        if (sessionAtStart !== playSessionId) return;
        const label = String.fromCharCode(65 + k);
        const separator = getUiLang() === 'ja' ? '。' : '. ';
        await speakText(`${label}${separator}${choices[k]}`, sessionAtStart);
        await sleep(250);
      }
    }
    await sleep(parseFloat(elements.delayA.value) * 1000);
    if (sessionAtStart !== playSessionId) return;

    revealAnswerForCurrent = true;
    revealedAnswerIdxSet.add(idx);
    renderList();

    if (choices.length) {
      const separator = getUiLang() === 'ja' ? '。' : ': ';
      await speakText(`${t('correctLabel')}${separator}${answer}`, sessionAtStart);
    } else {
      await speakText(answer, sessionAtStart);
    }
    await sleep(500);
    idx++;
    if (idx >= items.length) { playing = false; updateStatus(t('statusVoyageEnd')); renderList(); return; }
  }
}


// 直接入力から読込
document.getElementById('loadDirectBtn').onclick = () => {
  const raw = document.getElementById('directInput').value.trim();
  if (!raw) { showError(t('noInput')); return; }
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const parsed = [];
  for (const line of lines) {
    const sep = line.includes('\t') ? '\t' : '|';
    const parts = line.split(sep);
    if (parts.length >= 2) {
      const q = parts[0].trim();
      const a = parts.slice(1).join(sep).trim();
      if (q && a) parsed.push({ q, a });
    }
  }
  if (!parsed.length) { showError(t('invalidQA')); return; }
  loadDataFromJSON({ version: 1, items: parsed });
  showSuccess(t('loadedCount', parsed.length));
};
elements.startBtn.onclick = () => { if(!items.length) return; hardStop(); idx=0; playing=true; startNoteLoop(); playLoop(playSessionId); };
elements.pauseBtn.onclick = () => {
  if (paused) { hardStop(); playing=true; paused=false; startNoteLoop(); playLoop(playSessionId); }
  else if (playing) { hardStop(); playing=false; paused=true; startNoteLoop(); updateStatus(t('statusPaused')); renderList(); }
};
elements.stopBtn.onclick = () => { hardStop(); playing=false; paused=false; idx=-1; renderList(); updateProgress(); updateStatus(t('statusStopped')); startNoteLoop(); };
elements.nextBtn.onclick = () => { if(!items.length) return; hardStop(); idx=Math.min(items.length-1, idx+1); playing=true; startNoteLoop(); playLoop(playSessionId); };
elements.prevBtn.onclick = () => { if(!items.length) return; hardStop(); idx=Math.max(0, idx-1); playing=true; startNoteLoop(); playLoop(playSessionId); };

elements.list.onclick = (e) => {
  const row = e.target.closest('.item');
  if(!row) return;
  hardStop(); idx = parseInt(row.dataset.idx); playing=true; startNoteLoop(); playLoop(playSessionId);
};

function loadDataFromJSON(data) {
  hardStop();
  items = data.items || [];
  revealedAnswerIdxSet = new Set();
  idx = items.length ? 0 : -1;
  renderList();
  updateProgress();
  loadVoices();
  applyI18n();
  startNoteLoop();
}

elements.topImportFile.onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const content = reader.result;
    if (file.name.endsWith('.txt') || file.type === 'text/plain') {
      // テキストファイル：質問|答え 形式で解析
      const lines = content.split('\n').map(l => l.trim()).filter(Boolean);
      const parsed = [];
      for (const line of lines) {
        const sep = line.includes('\t') ? '\t' : '|';
        const parts = line.split(sep);
        if (parts.length >= 2) {
          const q = parts[0].trim();
          const a = parts.slice(1).join(sep).trim();
          if (q && a) parsed.push({ q, a });
        }
      }
      if (!parsed.length) { showError(t('fileInvalidQA')); return; }
      loadDataFromJSON({ version: 1, items: parsed });
      showSuccess(t('loadedCount', parsed.length));
    } else {
      // JSONファイル
      try {
        loadDataFromJSON(JSON.parse(content));
        showSuccess(t('jsonLoaded'));
      } catch {
        showError(t('jsonParseError'));
      }
    }
  };
  reader.readAsText(file);
};

/* =========================
   起動時：埋め込みボカロクイズ100を自動ロード
   ========================= */
window.addEventListener('DOMContentLoaded', () => {
  try {
    loadDataFromJSON(EMBEDDED_DATA);
    applyI18n();
    showSuccess(t('embeddedLoaded', (EMBEDDED_DATA.items||[]).length));
    updateStatus(t('statusReadyEmbedded'));
  } catch (e) {
    showError(t('embeddedFailed'));
    updateStatus(t('statusReady'));
  }
});

window.addEventListener('keydown', (e) => {
  if (['INPUT','SELECT'].includes(document.activeElement.tagName)) return;
  if (e.code === 'Space') { e.preventDefault(); elements.pauseBtn.click(); }
  if (e.key === 'ArrowRight') elements.nextBtn.click();
  if (e.key === 'ArrowLeft') elements.prevBtn.click();
  if (e.key.toLowerCase() === 'a') {
    elements.showAnswerSel.value = elements.showAnswerSel.value === '1' ? '0' : '1';
    renderList();
  }
});

/* =========================
   背景：ライムグリーン音符
   ========================= */
const bgNotesEl = document.getElementById('bg-notes');
const noteSymbols = ['♪', '♫', '♬', '♩'];

function createFloatingNote() {
  const note = document.createElement('div');
  note.className = 'floating-note';
  note.textContent = noteSymbols[(Math.random() * noteSymbols.length) | 0];

  const x = Math.random() * window.innerWidth;
  note.style.left = `${x}px`;

  const duration = 5 + Math.random() * 5;          // 5〜10秒
  const size = 12 + Math.random() * 18;            // 12〜30px
  const drift = (Math.random() * 120 - 60).toFixed(0) + 'px'; // 横揺れ
  note.style.fontSize = `${size}px`;
  note.style.animationDuration = `${duration}s`;
  note.style.opacity = (0.25 + Math.random() * 0.55).toFixed(2);
  note.style.setProperty('--drift', drift);

  bgNotesEl.appendChild(note);

  setTimeout(() => note.remove(), duration * 1000);
}

/* =========================
   背景音符：状況依存の出現間隔（再生中だけ少し減らす）
   ========================= */
let noteTimer = null;

function startNoteLoop() {
  if (noteTimer) clearInterval(noteTimer);

  // 再生中は少しだけ控えめ（邪魔しない）
  const interval = playing ? 700 : 520;

  noteTimer = setInterval(createFloatingNote, interval);
}

// 初期状態（停止中）
startNoteLoop();

loadVoices();
</script>
</body>
